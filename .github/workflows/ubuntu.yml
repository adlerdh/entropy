name: Ubuntu CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly full Ubuntu validation. Run manually when release confidence is needed sooner.
    - cron: "47 8 * * 0"
  workflow_dispatch:
    inputs:
      run_debug:
        description: "Run debug build and unit tests"
        type: boolean
        default: true
      run_release:
        description: "Run release build and package artifacts"
        type: boolean
        default: false
      run_coverage:
        description: "Run Ubuntu coverage report"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ubuntu-ci-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.run_coverage && 'coverage' || 'ci' }}
  cancel-in-progress: true

env:
  CC: gcc-13
  CXX: g++-13
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  CTEST_PARALLEL_LEVEL: 2
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 2G
  DEPS_CACHE_VERSION: v1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install formatting tools
        run: |
          python -m pip install pre-commit 'clang-format==18.1.8'

      - name: Validate formatting tools
        run: |
          clang-format --version
          pre-commit --version

      - name: Run pre-commit checks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Require clean formatting result
        run: git diff --exit-code

  debug:
    name: Debug Build And Tests (x86_64)
    runs-on: ubuntu-22.04
    needs: format
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.run_debug)
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 3

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y software-properties-common
          sudo add-apt-repository --yes ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache \
            gcc-13 \
            g++-13 \
            libdbus-1-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            xorg-dev

      - name: Validate runner tools
        run: |
          lsb_release -a
          cmake --version
          git --version
          ccache --version
          "${CC}" --version
          "${CXX}" --version

      - name: Restore Debug ccache
        uses: actions/cache@v6
        with:
          path: .ccache
          key: ubuntu2204-gcc13-debug-ccache-v1-${{ github.run_id }}
          restore-keys: |
            ubuntu2204-gcc13-debug-ccache-v1-

      - name: Reset Debug ccache stats
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --max-size="${CCACHE_MAXSIZE}"
            ccache --zero-stats
          else
            echo "ccache not found; skipping ccache stats reset"
          fi

      - name: Restore Debug Dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            build-debug/external/catch2-*
            build-debug/external/cli11-*
            build-debug/external/cmakerc-*
            build-debug/external/curl-*
            build-debug/external/glfw-*
            build-debug/external/glm-*
            build-debug/external/iconfont-*
            build-debug/external/imgui-*
            build-debug/external/implot-*
            build-debug/external/itk-*
            build-debug/external/nanovg-*
            build-debug/external/nativefiledialog-*
            build-debug/external/nlohmann_json-*
            build-debug/external/qtbase-*
            build-debug/external/spdlog-*
            build-debug/external/stduuid-*
            build-debug/external/tinyfsm-*
          key: ubuntu2204-gcc13-debug-deps-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            ubuntu2204-gcc13-debug-deps-${{ env.DEPS_CACHE_VERSION }}-

      - name: Configure Debug Dependencies
        run: cmake --preset deps-debug -D Entropy_USE_CCACHE=ON

      - name: Build Debug Dependencies
        run: cmake --build --preset deps-debug --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: Configure Debug app
        run: cmake --preset app-debug -D Entropy_USE_CCACHE=ON

      - name: Build Debug app
        run: cmake --build --preset app-debug --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: Run Debug tests
        run: ctest --test-dir build-debug --parallel "${CTEST_PARALLEL_LEVEL}" --output-on-failure

      - name: Show Debug ccache stats
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache not found; skipping ccache stats"
          fi

  coverage:
    name: Coverage Report (x86_64)
    runs-on: ubuntu-22.04
    needs: format
    if: github.event_name == 'workflow_dispatch' && inputs.run_coverage
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build and coverage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y software-properties-common
          sudo add-apt-repository --yes ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache \
            gcc-13 \
            g++-13 \
            libdbus-1-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            python3-pip \
            xorg-dev
          python3 -m pip install --user 'gcovr==7.0'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate runner tools
        run: |
          lsb_release -a
          cmake --version
          "${CC}" --version
          "${CXX}" --version
          gcovr --version

      - name: Restore Coverage ccache
        uses: actions/cache@v6
        with:
          path: .ccache
          key: ubuntu2204-gcc13-coverage-ccache-v1-${{ github.run_id }}
          restore-keys: |
            ubuntu2204-gcc13-coverage-ccache-v1-

      - name: Reset Coverage ccache stats
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --max-size="${CCACHE_MAXSIZE}"
            ccache --zero-stats
          else
            echo "ccache not found; skipping ccache stats reset"
          fi

      - name: Restore Coverage Dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            build-coverage/external/catch2-*
            build-coverage/external/cli11-*
            build-coverage/external/cmakerc-*
            build-coverage/external/curl-*
            build-coverage/external/glfw-*
            build-coverage/external/glm-*
            build-coverage/external/iconfont-*
            build-coverage/external/imgui-*
            build-coverage/external/implot-*
            build-coverage/external/itk-*
            build-coverage/external/nanovg-*
            build-coverage/external/nativefiledialog-*
            build-coverage/external/nlohmann_json-*
            build-coverage/external/qtbase-*
            build-coverage/external/spdlog-*
            build-coverage/external/stduuid-*
            build-coverage/external/tinyfsm-*
          key: ubuntu2204-gcc13-coverage-deps-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            ubuntu2204-gcc13-coverage-deps-${{ env.DEPS_CACHE_VERSION }}-

      - name: Configure Coverage Dependencies
        run: >
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_SHARED_LIBS=ON
          -DEntropy_USE_CCACHE=ON
          -DEntropy_SUPERBUILD=ON
          -DEntropy_SUPERBUILD_CONFIG=Debug

      - name: Build Coverage Dependencies
        run: cmake --build build-coverage --config Debug --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: Configure Coverage app
        run: >
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_SHARED_LIBS=ON
          -DEntropy_USE_CCACHE=ON
          -DEntropy_SUPERBUILD=OFF
          -DEntropy_ENABLE_COVERAGE=ON

      - name: Build Coverage app
        run: cmake --build build-coverage --config Debug --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: Generate coverage summary
        run: cmake --build build-coverage --target coverage --config Debug --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: Generate HTML coverage
        run: cmake --build build-coverage --target coverage-html --config Debug --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-coverage-html
          path: build-coverage/coverage/html/
          if-no-files-found: error

      - name: Prepare coverage Pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p coverage-pages/coverage
          cp -R build-coverage/coverage/html coverage-pages/coverage/html
          python3 .github/scripts/generate_coverage_pages.py \
            --summary build-coverage/coverage/summary.json \
            --output coverage-pages/coverage

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload coverage Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage-pages

      - name: Deploy coverage Pages
        id: deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

      - name: Show Coverage ccache stats
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache not found; skipping ccache stats"
          fi

  package:
    name: Release Packages (x86_64)
    runs-on: ubuntu-22.04
    needs: format
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_release)

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y software-properties-common
          sudo add-apt-repository --yes ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache \
            gcc-13 \
            g++-13 \
            dpkg-dev \
            fakeroot \
            file \
            libdbus-1-dev \
            libssl-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            xorg-dev

      - name: Validate runner tools
        run: |
          lsb_release -a
          cmake --version
          cpack --version
          "${CC}" --version
          "${CXX}" --version
          dpkg-deb --version

      - name: Restore Release ccache
        uses: actions/cache@v6
        with:
          path: .ccache
          key: ubuntu2204-gcc13-release-ccache-v1-${{ github.run_id }}
          restore-keys: |
            ubuntu2204-gcc13-release-ccache-v1-

      - name: Reset Release ccache stats
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --max-size="${CCACHE_MAXSIZE}"
            ccache --zero-stats
          else
            echo "ccache not found; skipping ccache stats reset"
          fi

      - name: Restore Release Dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            build-release/external/catch2-*
            build-release/external/cli11-*
            build-release/external/cmakerc-*
            build-release/external/curl-*
            build-release/external/glfw-*
            build-release/external/glm-*
            build-release/external/iconfont-*
            build-release/external/imgui-*
            build-release/external/implot-*
            build-release/external/itk-*
            build-release/external/nanovg-*
            build-release/external/nativefiledialog-*
            build-release/external/nlohmann_json-*
            build-release/external/qtbase-*
            build-release/external/spdlog-*
            build-release/external/stduuid-*
            build-release/external/tinyfsm-*
          key: ubuntu2204-gcc13-release-deps-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            ubuntu2204-gcc13-release-deps-${{ env.DEPS_CACHE_VERSION }}-

      - name: Configure Release Dependencies
        run: cmake --preset deps-release

      - name: Build Release Dependencies
        run: cmake --build --preset deps-release --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: Configure Release app
        run: cmake --preset app-release

      - name: Build Release app
        run: cmake --build --preset app-release --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: Run Release tests
        run: ctest --test-dir build-release --parallel "${CTEST_PARALLEL_LEVEL}" --output-on-failure

      - name: Build DEB and portable TAR.GZ
        run: cmake --build --preset package-release --parallel "${CMAKE_BUILD_PARALLEL_LEVEL}"

      - name: Inspect DEB package
        run: |
          dpkg-deb --info build-release/packages/Entropy-*-Ubuntu-22.04-*.deb
          dpkg-deb --contents build-release/packages/Entropy-*-Ubuntu-22.04-*.deb

      - name: Smoke-test staged install
        run: |
          cmake --install build-release --prefix build-release/ubuntu-package-install
          build-release/ubuntu-package-install/bin/entropy --help

      - name: Upload Ubuntu packages
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-22.04-x86_64-packages
          path: |
            build-release/packages/Entropy-*-Ubuntu-22.04-*.deb
            build-release/packages/Entropy-*-Ubuntu-22.04-*-portable.tar.gz
          if-no-files-found: error

      - name: Show Release ccache stats
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache not found; skipping ccache stats"
          fi
