name: macOS CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly full macOS validation. Run manually when release confidence is needed sooner.
    - cron: "11 9 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: macos-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  CTEST_PARALLEL_LEVEL: 2
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 2G
  SUPERBUILD_CACHE_VERSION: v2
  ENTROPY_MACOS_ARCHITECTURES: arm64
  ENTROPY_MACOS_DEPLOYMENT_TARGET: "13.3"
  ENTROPY_MACOS_SUPERBUILD_PARALLEL: 2

jobs:
  format:
    name: Format Check
    runs-on: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install formatting tools
        run: python -m pip install pre-commit 'clang-format==18.1.8'

      - name: Validate formatting tools
        run: |
          sw_vers
          test "$(uname -m)" = "arm64"
          clang-format --version
          pre-commit --version

      - name: Run pre-commit checks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Require clean formatting result
        run: git diff --exit-code

  debug:
    name: Debug Build And Tests
    runs-on: macos-14
    needs: format

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install ccache

      - name: Validate runner tools
        run: |
          sw_vers
          test "$(uname -m)" = "arm64"
          cmake --version
          git --version
          ccache --version
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Restore Debug ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: macos14-arm64-appleclang-debug-ccache-v1-${{ github.run_id }}
          restore-keys: |
            macos14-arm64-appleclang-debug-ccache-v1-

      - name: Reset Debug ccache stats
        run: |
          ccache --max-size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Restore Debug SuperBuild cache
        uses: actions/cache@v5
        with:
          path: |
            build-debug/external/catch2-*
            build-debug/external/cli11-*
            build-debug/external/cmakerc-*
            build-debug/external/glfw-*
            build-debug/external/glm-*
            build-debug/external/iconfont-*
            build-debug/external/imgui-*
            build-debug/external/implot-*
            build-debug/external/itk-*
            build-debug/external/nanovg-*
            build-debug/external/nativefiledialog-*
            build-debug/external/nlohmann_json-*
            build-debug/external/qtbase-*
            build-debug/external/spdlog-*
            build-debug/external/stduuid-*
            build-debug/external/tinyfsm-*
          key: macos14-arm64-appleclang-debug-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            macos14-arm64-appleclang-debug-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-

      - name: Configure Debug SuperBuild
        run: >
          cmake --preset superbuild-debug
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"
          -DEntropy_SUPERBUILD_PARALLEL="${ENTROPY_MACOS_SUPERBUILD_PARALLEL}"

      - name: Build Debug SuperBuild
        run: cmake --build --preset superbuild-debug --parallel 1

      - name: Configure Debug app
        run: >
          cmake --preset app-debug
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"

      - name: Build Debug app
        run: cmake --build --preset app-debug --parallel

      - name: Run Debug tests
        run: ctest --test-dir build-debug --parallel --output-on-failure

      - name: Show Debug ccache stats
        if: always()
        run: ccache --show-stats

  debug-x64:
    name: Debug Build And Tests (x86_64)
    runs-on: macos-15-intel
    needs: format
    env:
      ENTROPY_MACOS_ARCHITECTURES: x86_64

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install ccache

      - name: Validate runner tools
        run: |
          sw_vers
          test "$(uname -m)" = "x86_64"
          cmake --version
          git --version
          ccache --version
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Restore Debug ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: macos15-intel-x86_64-appleclang-debug-ccache-v1-${{ github.run_id }}
          restore-keys: |
            macos15-intel-x86_64-appleclang-debug-ccache-v1-

      - name: Reset Debug ccache stats
        run: |
          ccache --max-size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Restore Debug SuperBuild cache
        uses: actions/cache@v5
        with:
          path: |
            build-debug/external/catch2-*
            build-debug/external/cli11-*
            build-debug/external/cmakerc-*
            build-debug/external/glfw-*
            build-debug/external/glm-*
            build-debug/external/iconfont-*
            build-debug/external/imgui-*
            build-debug/external/implot-*
            build-debug/external/itk-*
            build-debug/external/nanovg-*
            build-debug/external/nativefiledialog-*
            build-debug/external/nlohmann_json-*
            build-debug/external/qtbase-*
            build-debug/external/spdlog-*
            build-debug/external/stduuid-*
            build-debug/external/tinyfsm-*
          key: macos15-intel-x86_64-appleclang-debug-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            macos15-intel-x86_64-appleclang-debug-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-

      - name: Configure Debug SuperBuild
        run: >
          cmake --preset superbuild-debug
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"
          -DEntropy_SUPERBUILD_PARALLEL="${ENTROPY_MACOS_SUPERBUILD_PARALLEL}"

      - name: Build Debug SuperBuild
        run: cmake --build --preset superbuild-debug --parallel 1

      - name: Configure Debug app
        run: >
          cmake --preset app-debug
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"

      - name: Build Debug app
        run: cmake --build --preset app-debug --parallel

      - name: Run Debug tests
        run: ctest --test-dir build-debug --parallel --output-on-failure

      - name: Show Debug ccache stats
        if: always()
        run: ccache --show-stats

  coverage:
    name: Coverage Report
    runs-on: macos-14
    needs: format
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install ccache

      - name: Validate runner tools
        run: |
          sw_vers
          test "$(uname -m)" = "arm64"
          cmake --version
          ccache --version
          xcodebuild -version
          xcrun --show-sdk-version
          xcrun --find llvm-cov
          xcrun --find llvm-profdata

      - name: Restore Coverage ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: macos14-arm64-appleclang-coverage-ccache-v1-${{ github.run_id }}
          restore-keys: |
            macos14-arm64-appleclang-coverage-ccache-v1-

      - name: Reset Coverage ccache stats
        run: |
          ccache --max-size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Restore Coverage SuperBuild cache
        uses: actions/cache@v5
        with:
          path: |
            build-coverage/external/catch2-*
            build-coverage/external/cli11-*
            build-coverage/external/cmakerc-*
            build-coverage/external/glfw-*
            build-coverage/external/glm-*
            build-coverage/external/iconfont-*
            build-coverage/external/imgui-*
            build-coverage/external/implot-*
            build-coverage/external/itk-*
            build-coverage/external/nanovg-*
            build-coverage/external/nativefiledialog-*
            build-coverage/external/nlohmann_json-*
            build-coverage/external/qtbase-*
            build-coverage/external/spdlog-*
            build-coverage/external/stduuid-*
            build-coverage/external/tinyfsm-*
          key: macos14-arm64-appleclang-coverage-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            macos14-arm64-appleclang-coverage-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-

      - name: Configure Coverage SuperBuild
        run: >
          cmake --preset superbuild-coverage
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"
          -DEntropy_SUPERBUILD_PARALLEL="${ENTROPY_MACOS_SUPERBUILD_PARALLEL}"

      - name: Build Coverage SuperBuild
        run: cmake --build --preset superbuild-coverage --parallel 1

      - name: Configure Coverage app
        run: >
          cmake --preset app-coverage
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"

      - name: Build Coverage app
        run: cmake --build --preset app-coverage --parallel

      - name: Generate coverage summary
        run: cmake --build --preset coverage --parallel

      - name: Generate HTML coverage
        run: cmake --build --preset coverage-html --parallel

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: macos-coverage-html
          path: build-coverage/coverage/html/
          if-no-files-found: error

      - name: Show Coverage ccache stats
        if: always()
        run: ccache --show-stats

  package:
    name: Release Packages
    runs-on: macos-14
    needs: format
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install ccache

      - name: Validate runner tools
        run: |
          sw_vers
          test "$(uname -m)" = "arm64"
          cmake --version
          cpack --version
          git --version
          ccache --version
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Restore Release ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: macos14-arm64-appleclang-release-ccache-v1-${{ github.run_id }}
          restore-keys: |
            macos14-arm64-appleclang-release-ccache-v1-

      - name: Reset Release ccache stats
        run: |
          ccache --max-size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Restore Release SuperBuild cache
        uses: actions/cache@v5
        with:
          path: |
            build-release/external/catch2-*
            build-release/external/cli11-*
            build-release/external/cmakerc-*
            build-release/external/glfw-*
            build-release/external/glm-*
            build-release/external/iconfont-*
            build-release/external/imgui-*
            build-release/external/implot-*
            build-release/external/itk-*
            build-release/external/nanovg-*
            build-release/external/nativefiledialog-*
            build-release/external/nlohmann_json-*
            build-release/external/qtbase-*
            build-release/external/spdlog-*
            build-release/external/stduuid-*
            build-release/external/tinyfsm-*
          key: macos14-arm64-appleclang-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            macos14-arm64-appleclang-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-

      - name: Configure Release SuperBuild
        run: >
          cmake --preset superbuild-release
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"
          -DEntropy_SUPERBUILD_PARALLEL="${ENTROPY_MACOS_SUPERBUILD_PARALLEL}"

      - name: Build Release SuperBuild
        run: cmake --build --preset superbuild-release --parallel 1

      - name: Configure Release app
        run: >
          cmake --preset app-release
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"

      - name: Build Release app
        run: cmake --build --preset app-release --parallel

      - name: Run Release tests
        run: ctest --test-dir build-release --parallel --output-on-failure

      - name: Validate deployment target
        run: otool -l build-release/bin/Entropy.app/Contents/MacOS/entropy | grep -A3 LC_BUILD_VERSION

      - name: Build DMG and ZIP
        run: cmake --build --preset package-release --parallel

      - name: Smoke-test staged install
        run: |
          cmake --install build-release --prefix build-release/macos-package-install
          build-release/macos-package-install/Entropy.app/Contents/MacOS/entropy --help

      - name: Upload macOS packages
        uses: actions/upload-artifact@v7
        with:
          name: macos-packages
          path: |
            build-release/packages/Entropy-*-macOS-*.dmg
            build-release/packages/Entropy-*-macOS-*.zip
          if-no-files-found: error

      - name: Show Release ccache stats
        if: always()
        run: ccache --show-stats

  macos-26-smoke:
    name: macOS 26 Smoke Build And Tests
    runs-on: macos-26
    needs: format
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: brew install ccache

      - name: Validate runner tools
        run: |
          sw_vers
          test "$(uname -m)" = "arm64"
          cmake --version
          git --version
          ccache --version
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Restore Debug ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: macos26-arm64-appleclang-debug-ccache-v1-${{ github.run_id }}
          restore-keys: |
            macos26-arm64-appleclang-debug-ccache-v1-

      - name: Reset Debug ccache stats
        run: |
          ccache --max-size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Restore Debug SuperBuild cache
        uses: actions/cache@v5
        with:
          path: |
            build-debug/external/catch2-*
            build-debug/external/cli11-*
            build-debug/external/cmakerc-*
            build-debug/external/glfw-*
            build-debug/external/glm-*
            build-debug/external/iconfont-*
            build-debug/external/imgui-*
            build-debug/external/implot-*
            build-debug/external/itk-*
            build-debug/external/nanovg-*
            build-debug/external/nativefiledialog-*
            build-debug/external/nlohmann_json-*
            build-debug/external/qtbase-*
            build-debug/external/spdlog-*
            build-debug/external/stduuid-*
            build-debug/external/tinyfsm-*
          key: macos26-arm64-appleclang-debug-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            macos26-arm64-appleclang-debug-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-

      - name: Configure Debug SuperBuild
        run: >
          cmake --preset superbuild-debug
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"
          -DEntropy_SUPERBUILD_PARALLEL="${ENTROPY_MACOS_SUPERBUILD_PARALLEL}"

      - name: Build Debug SuperBuild
        run: cmake --build --preset superbuild-debug --parallel 1

      - name: Configure Debug app
        run: >
          cmake --preset app-debug
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"

      - name: Build Debug app
        run: cmake --build --preset app-debug --parallel

      - name: Run Debug tests
        run: ctest --test-dir build-debug --parallel --output-on-failure

      - name: Show Debug ccache stats
        if: always()
        run: ccache --show-stats
