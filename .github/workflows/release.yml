name: Release (x86_64 + arm64)

on:
  push:
    tags:
      - "v*.*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  CTEST_PARALLEL_LEVEL: 2
  SUPERBUILD_CACHE_VERSION: v1

jobs:
  metadata:
    name: Release Metadata
    runs-on: ubuntu-22.04
    outputs:
      entropy_version: ${{ steps.version.outputs.entropy_version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Verify release tag matches project version
        id: version
        run: |
          tag="$GITHUB_REF_NAME"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must be named like v0.9.5.0, got '$tag'" >&2
            exit 1
          fi

          major=$(sed -nE 's/.*set\(VERSION_MAJOR[[:space:]]+([0-9]+)\).*/\1/p' CMakeLists.txt | head -n 1)
          minor=$(sed -nE 's/.*set\(VERSION_MINOR[[:space:]]+([0-9]+)\).*/\1/p' CMakeLists.txt | head -n 1)
          feature=$(sed -nE 's/.*set\(VERSION_FEATURE[[:space:]]+([0-9]+)\).*/\1/p' CMakeLists.txt | head -n 1)
          patch=$(sed -nE 's/.*set\(VERSION_PATCH[[:space:]]+([0-9]+)\).*/\1/p' CMakeLists.txt | head -n 1)
          if [[ -z "$major" || -z "$minor" || -z "$feature" || -z "$patch" ]]; then
            echo "Unable to parse VERSION_* values from CMakeLists.txt" >&2
            exit 1
          fi

          version="$major.$minor.$feature.$patch"
          if [[ "$tag" != "v$version" ]]; then
            echo "Release tag '$tag' does not match CMakeLists.txt VERSION_FULL '$version'" >&2
            exit 1
          fi

          echo "entropy_version=$version" >> "$GITHUB_OUTPUT"
          {
            echo "### Entropy release"
            echo
            echo "Tag: $tag"
            echo "Version: $version"
          } >> "$GITHUB_STEP_SUMMARY"

  windows-x86_64:
    name: Windows Release (x86_64)
    runs-on: windows-2022
    needs: metadata
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
      CMAKE_GENERATOR_PLATFORM: x64
      ENTROPY_VERSION: ${{ needs.metadata.outputs.entropy_version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Map short workspace path
        run: 'subst S: "$env:GITHUB_WORKSPACE"'

      - name: Validate runner tools
        working-directory: 'S:\'
        run: |
          cmake --version
          git --version
          vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          Get-Command candle.exe -ErrorAction Stop
          Get-Command light.exe -ErrorAction Stop

      - name: Restore Release SuperBuild cache
        uses: actions/cache@v5
        with:
          path: |
            build-release/external/catch2-*
            build-release/external/cli11-*
            build-release/external/cmakerc-*
            build-release/external/glfw-*
            build-release/external/glm-*
            build-release/external/iconfont-*
            build-release/external/imgui-*
            build-release/external/implot-*
            build-release/external/itk-*
            build-release/external/nanovg-*
            build-release/external/nativefiledialog-*
            build-release/external/nlohmann_json-*
            build-release/external/qtbase-*
            build-release/external/spdlog-*
            build-release/external/stduuid-*
            build-release/external/tinyfsm-*
          key: windows-msvc2022-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            windows-msvc2022-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-

      - name: Configure Release SuperBuild
        working-directory: 'S:\'
        run: cmake --preset superbuild-release

      - name: Build Release SuperBuild
        working-directory: 'S:\'
        run: cmake --build --preset superbuild-release --parallel

      - name: Configure Release app
        working-directory: 'S:\'
        run: cmake --preset app-release

      - name: Build Release app
        working-directory: 'S:\'
        run: cmake --build --preset app-release --parallel

      - name: Run Release tests
        working-directory: 'S:\'
        run: ctest --test-dir build-release -C Release --parallel --output-on-failure

      - name: Build MSI and portable ZIP
        working-directory: 'S:\'
        run: cmake --build --preset package-release --parallel

      - name: Smoke-test staged install
        working-directory: 'S:\'
        run: |
          cmake --install build-release --config Release --prefix build-release\windows-package-install
          & .\build-release\windows-package-install\entropy.exe --help

      - name: Locate release assets
        working-directory: 'S:\'
        run: |
          $packageDir = "build-release\packages"
          $msi = Get-ChildItem $packageDir -Filter "Entropy-$env:ENTROPY_VERSION-Windows-*.msi" -File | Select-Object -First 1
          $zip = Get-ChildItem $packageDir -Filter "Entropy-$env:ENTROPY_VERSION-Windows-*-portable.zip" -File | Select-Object -First 1

          if (-not $msi) {
            throw "MSI package was not found in $packageDir"
          }
          if (-not $zip) {
            throw "Portable ZIP package was not found in $packageDir"
          }

          "MSI: $($msi.Name)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "Portable ZIP: $($zip.Name)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload Windows packages as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: entropy-${{ env.ENTROPY_VERSION }}-windows-x86_64
          path: |
            build-release/packages/Entropy-${{ env.ENTROPY_VERSION }}-Windows-*.msi
            build-release/packages/Entropy-${{ env.ENTROPY_VERSION }}-Windows-*-portable.zip
          if-no-files-found: error

  linux-x86_64:
    name: Ubuntu 22.04 Release (x86_64)
    runs-on: ubuntu-22.04
    needs: metadata
    env:
      CC: gcc-13
      CXX: g++-13
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 2G
      ENTROPY_VERSION: ${{ needs.metadata.outputs.entropy_version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y software-properties-common
          sudo add-apt-repository --yes ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache \
            gcc-13 \
            g++-13 \
            dpkg-dev \
            fakeroot \
            file \
            libdbus-1-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            xorg-dev

      - name: Validate runner tools
        run: |
          lsb_release -a
          cmake --version
          cpack --version
          git --version
          "${CC}" --version
          "${CXX}" --version
          ccache --version
          dpkg-deb --version

      - name: Restore Release ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: linux-ubuntu2204-gcc13-release-publish-ccache-v1-${{ github.run_id }}
          restore-keys: |
            linux-ubuntu2204-gcc13-release-publish-ccache-v1-

      - name: Reset Release ccache stats
        run: |
          ccache --max-size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Restore Release SuperBuild cache
        uses: actions/cache@v5
        with:
          path: |
            build-release/external/catch2-*
            build-release/external/cli11-*
            build-release/external/cmakerc-*
            build-release/external/glfw-*
            build-release/external/glm-*
            build-release/external/iconfont-*
            build-release/external/imgui-*
            build-release/external/implot-*
            build-release/external/itk-*
            build-release/external/nanovg-*
            build-release/external/nativefiledialog-*
            build-release/external/nlohmann_json-*
            build-release/external/qtbase-*
            build-release/external/spdlog-*
            build-release/external/stduuid-*
            build-release/external/tinyfsm-*
          key: linux-ubuntu2204-gcc13-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            linux-ubuntu2204-gcc13-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-

      - name: Configure Release SuperBuild
        run: cmake --preset superbuild-release

      - name: Build Release SuperBuild
        run: cmake --build --preset superbuild-release --parallel

      - name: Configure Release app
        run: cmake --preset app-release

      - name: Build Release app
        run: cmake --build --preset app-release --parallel

      - name: Run Release tests
        run: ctest --test-dir build-release --parallel --output-on-failure

      - name: Build DEB and portable TAR.GZ
        run: cmake --build --preset package-release --parallel

      - name: Inspect DEB package
        run: |
          dpkg-deb --info build-release/packages/Entropy-${ENTROPY_VERSION}-Ubuntu-22.04-*.deb
          dpkg-deb --contents build-release/packages/Entropy-${ENTROPY_VERSION}-Ubuntu-22.04-*.deb

      - name: Smoke-test staged install
        run: |
          cmake --install build-release --prefix build-release/linux-package-install
          build-release/linux-package-install/bin/entropy --help

      - name: Locate release assets
        run: |
          package_dir="build-release/packages"
          deb=$(find "$package_dir" -maxdepth 1 -type f -name "Entropy-${ENTROPY_VERSION}-Ubuntu-22.04-*.deb" | head -n 1)
          tarball=$(find "$package_dir" -maxdepth 1 -type f -name "Entropy-${ENTROPY_VERSION}-Ubuntu-22.04-*-portable.tar.gz" | head -n 1)

          if [[ -z "$deb" ]]; then
            echo "DEB package was not found in $package_dir" >&2
            exit 1
          fi
          if [[ -z "$tarball" ]]; then
            echo "Portable TAR.GZ package was not found in $package_dir" >&2
            exit 1
          fi

          {
            echo "DEB: $(basename "$deb")"
            echo "Portable TAR.GZ: $(basename "$tarball")"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Linux packages as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: entropy-${{ env.ENTROPY_VERSION }}-ubuntu-22.04-x86_64
          path: |
            build-release/packages/Entropy-${{ env.ENTROPY_VERSION }}-Ubuntu-22.04-*.deb
            build-release/packages/Entropy-${{ env.ENTROPY_VERSION }}-Ubuntu-22.04-*-portable.tar.gz
          if-no-files-found: error

      - name: Show Release ccache stats
        if: always()
        run: ccache --show-stats

  macos-arm64:
    name: macOS Release (arm64)
    runs-on: macos-14
    needs: metadata
    env:
      ENTROPY_VERSION: ${{ needs.metadata.outputs.entropy_version }}
      SUPERBUILD_CACHE_VERSION: v2
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 2G
      ENTROPY_MACOS_ARCHITECTURES: arm64
      ENTROPY_MACOS_DEPLOYMENT_TARGET: "13.3"
      ENTROPY_MACOS_SUPERBUILD_PARALLEL: 2

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: brew install ccache

      - name: Validate runner tools
        run: |
          sw_vers
          test "$(uname -m)" = "arm64"
          cmake --version
          cpack --version
          git --version
          ccache --version
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Restore Release ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: macos14-arm64-appleclang-release-publish-ccache-v1-${{ github.run_id }}
          restore-keys: |
            macos14-arm64-appleclang-release-publish-ccache-v1-

      - name: Reset Release ccache stats
        run: |
          ccache --max-size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Restore Release SuperBuild cache
        uses: actions/cache@v5
        with:
          path: |
            build-release/external/catch2-*
            build-release/external/cli11-*
            build-release/external/cmakerc-*
            build-release/external/glfw-*
            build-release/external/glm-*
            build-release/external/iconfont-*
            build-release/external/imgui-*
            build-release/external/implot-*
            build-release/external/itk-*
            build-release/external/nanovg-*
            build-release/external/nativefiledialog-*
            build-release/external/nlohmann_json-*
            build-release/external/qtbase-*
            build-release/external/spdlog-*
            build-release/external/stduuid-*
            build-release/external/tinyfsm-*
          key: macos14-arm64-appleclang-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            macos14-arm64-appleclang-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-

      - name: Configure Release SuperBuild
        run: >
          cmake --preset superbuild-release
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"
          -DEntropy_SUPERBUILD_PARALLEL="${ENTROPY_MACOS_SUPERBUILD_PARALLEL}"

      - name: Build Release SuperBuild
        run: cmake --build --preset superbuild-release --parallel 1

      - name: Configure Release app
        run: >
          cmake --preset app-release
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"

      - name: Build Release app
        run: cmake --build --preset app-release --parallel

      - name: Run Release tests
        run: ctest --test-dir build-release --parallel --output-on-failure

      - name: Validate deployment target
        run: otool -l build-release/bin/Entropy.app/Contents/MacOS/entropy | grep -A3 LC_BUILD_VERSION

      - name: Build DMG and ZIP
        run: cmake --build --preset package-release --parallel

      - name: Smoke-test staged install
        run: |
          cmake --install build-release --prefix build-release/macos-package-install
          build-release/macos-package-install/Entropy.app/Contents/MacOS/entropy --help

      - name: Locate release assets
        run: |
          package_dir="build-release/packages"
          dmg=$(find "$package_dir" -maxdepth 1 -type f -name "Entropy-${ENTROPY_VERSION}-macOS-*.dmg" | head -n 1)
          zip=$(find "$package_dir" -maxdepth 1 -type f -name "Entropy-${ENTROPY_VERSION}-macOS-*.zip" | head -n 1)

          if [[ -z "$dmg" ]]; then
            echo "DMG package was not found in $package_dir" >&2
            exit 1
          fi
          if [[ -z "$zip" ]]; then
            echo "ZIP package was not found in $package_dir" >&2
            exit 1
          fi

          {
            echo "DMG: $(basename "$dmg")"
            echo "ZIP: $(basename "$zip")"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS packages as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: entropy-${{ env.ENTROPY_VERSION }}-macos-arm64
          path: |
            build-release/packages/Entropy-${{ env.ENTROPY_VERSION }}-macOS-*.dmg
            build-release/packages/Entropy-${{ env.ENTROPY_VERSION }}-macOS-*.zip
          if-no-files-found: error

      - name: Show Release ccache stats
        if: always()
        run: ccache --show-stats

  macos-x86_64:
    name: macOS Release (x86_64)
    runs-on: macos-15-intel
    needs: metadata
    env:
      ENTROPY_VERSION: ${{ needs.metadata.outputs.entropy_version }}
      SUPERBUILD_CACHE_VERSION: v2
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 2G
      ENTROPY_MACOS_ARCHITECTURES: x86_64
      ENTROPY_MACOS_DEPLOYMENT_TARGET: "13.3"
      ENTROPY_MACOS_SUPERBUILD_PARALLEL: 2

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: brew install ccache

      - name: Validate runner tools
        run: |
          sw_vers
          test "$(uname -m)" = "x86_64"
          cmake --version
          cpack --version
          git --version
          ccache --version
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Restore Release ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: macos15-intel-x86_64-appleclang-release-publish-ccache-v1-${{ github.run_id }}
          restore-keys: |
            macos15-intel-x86_64-appleclang-release-publish-ccache-v1-

      - name: Reset Release ccache stats
        run: |
          ccache --max-size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Restore Release SuperBuild cache
        uses: actions/cache@v5
        with:
          path: |
            build-release/external/catch2-*
            build-release/external/cli11-*
            build-release/external/cmakerc-*
            build-release/external/glfw-*
            build-release/external/glm-*
            build-release/external/iconfont-*
            build-release/external/imgui-*
            build-release/external/implot-*
            build-release/external/itk-*
            build-release/external/nanovg-*
            build-release/external/nativefiledialog-*
            build-release/external/nlohmann_json-*
            build-release/external/qtbase-*
            build-release/external/spdlog-*
            build-release/external/stduuid-*
            build-release/external/tinyfsm-*
          key: macos15-intel-x86_64-appleclang-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            macos15-intel-x86_64-appleclang-release-superbuild-${{ env.SUPERBUILD_CACHE_VERSION }}-

      - name: Configure Release SuperBuild
        run: >
          cmake --preset superbuild-release
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"
          -DEntropy_SUPERBUILD_PARALLEL="${ENTROPY_MACOS_SUPERBUILD_PARALLEL}"
          -DEntropy_PACKAGE_ARCHITECTURE=x86_64

      - name: Build Release SuperBuild
        run: cmake --build --preset superbuild-release --parallel 1

      - name: Configure Release app
        run: >
          cmake --preset app-release
          -DCMAKE_OSX_ARCHITECTURES="${ENTROPY_MACOS_ARCHITECTURES}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET="${ENTROPY_MACOS_DEPLOYMENT_TARGET}"
          -DEntropy_PACKAGE_ARCHITECTURE=x86_64

      - name: Build Release app
        run: cmake --build --preset app-release --parallel

      - name: Run Release tests
        run: ctest --test-dir build-release --parallel --output-on-failure

      - name: Validate deployment target
        run: otool -l build-release/bin/Entropy.app/Contents/MacOS/entropy | grep -A3 LC_BUILD_VERSION

      - name: Build DMG and ZIP
        run: cmake --build --preset package-release --parallel

      - name: Smoke-test staged install
        run: |
          cmake --install build-release --prefix build-release/macos-package-install
          build-release/macos-package-install/Entropy.app/Contents/MacOS/entropy --help

      - name: Locate release assets
        run: |
          package_dir="build-release/packages"
          dmg=$(find "$package_dir" -maxdepth 1 -type f -name "Entropy-${ENTROPY_VERSION}-macOS-x86_64.dmg" | head -n 1)
          zip=$(find "$package_dir" -maxdepth 1 -type f -name "Entropy-${ENTROPY_VERSION}-macOS-x86_64.zip" | head -n 1)

          if [[ -z "$dmg" ]]; then
            echo "macOS x86_64 DMG package was not found in $package_dir" >&2
            exit 1
          fi
          if [[ -z "$zip" ]]; then
            echo "macOS x86_64 ZIP package was not found in $package_dir" >&2
            exit 1
          fi

          {
            echo "DMG: $(basename "$dmg")"
            echo "ZIP: $(basename "$zip")"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS x86_64 packages as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: entropy-${{ env.ENTROPY_VERSION }}-macos-x86_64
          path: |
            build-release/packages/Entropy-${{ env.ENTROPY_VERSION }}-macOS-x86_64.dmg
            build-release/packages/Entropy-${{ env.ENTROPY_VERSION }}-macOS-x86_64.zip
          if-no-files-found: error

      - name: Show Release ccache stats
        if: always()
        run: ccache --show-stats

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - metadata
      - windows-x86_64
      - linux-x86_64
      - macos-arm64
      - macos-x86_64
    env:
      ENTROPY_VERSION: ${{ needs.metadata.outputs.entropy_version }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Create source archives
        run: |
          prefix="Entropy-${ENTROPY_VERSION}/"
          git archive --format=zip --prefix="$prefix" -o "release-assets/Entropy-${ENTROPY_VERSION}-source.zip" HEAD
          git archive --format=tar.gz --prefix="$prefix" -o "release-assets/Entropy-${ENTROPY_VERSION}-source.tar.gz" HEAD

      - name: List release assets
        run: |
          find release-assets -maxdepth 1 -type f -print | sort
          asset_count=$(find release-assets -maxdepth 1 -type f | wc -l)
          if [[ "$asset_count" -ne 10 ]]; then
            echo "Expected 10 release assets, found $asset_count" >&2
            exit 1
          fi

      - name: Create release notes
        run: |
          tag="$GITHUB_REF_NAME"
          generated_notes="$(mktemp)"
          gh api \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            --method POST \
            --field tag_name="$tag" \
            --jq .body > "$generated_notes"

          cat > release-notes.md <<EOF
          ## Downloads

          - macOS Apple Silicon (arm64): \`Entropy-${ENTROPY_VERSION}-macOS-arm64.dmg\`
          - macOS Intel (x86_64): \`Entropy-${ENTROPY_VERSION}-macOS-x86_64.dmg\`
          - Windows x86_64: \`Entropy-${ENTROPY_VERSION}-Windows-x86_64.msi\`
          - Ubuntu 22.04 x86_64: \`Entropy-${ENTROPY_VERSION}-Ubuntu-22.04-x86_64.deb\`
          - Portable archives are also attached for macOS, Windows, and Ubuntu.
          - Source archives are attached as \`zip\` and \`tar.gz\`.

          ## Notes

          - macOS builds are architecture-specific, not universal binaries.
          - Registration backends such as ANTs, FireANTs, and Greedy must be installed separately.
          - Prefer the platform installer/package for normal use; portable archives are intended for manual installs and testing.

          EOF
          cat "$generated_notes" >> release-notes.md

      - name: Create GitHub Release
        run: |
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub Release '$tag' already exists. Delete it or create a new tag before rerunning." >&2
            exit 1
          fi

          gh release create "$tag" \
            release-assets/* \
            --verify-tag \
            --notes-file release-notes.md \
            --title "Entropy $ENTROPY_VERSION"
