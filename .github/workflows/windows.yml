name: Windows CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly full Windows validation. Run manually when release confidence is needed sooner.
    - cron: "23 8 * * 0"
  workflow_dispatch:
    inputs:
      run_debug:
        description: "Run debug build and unit tests"
        type: boolean
        default: true
      run_release:
        description: "Run release build and package artifacts"
        type: boolean
        default: false
      run_smoke:
        description: "Run smoke build on Windows Server 2025"
        type: boolean
        default: false
      run_coverage:
        description: "Run Windows coverage troubleshooting job"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_GENERATOR: "Visual Studio 17 2022"
  CMAKE_GENERATOR_PLATFORM: x64
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  CTEST_PARALLEL_LEVEL: 2
  DEPS_CACHE_VERSION: v1
  SCCACHE_CACHE_VERSION: v1

jobs:
  format:
    name: Format Check
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Map short workspace path
        run: 'subst S: "$env:GITHUB_WORKSPACE"'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install formatting tools
        working-directory: 'S:\'
        run: python -m pip install pre-commit clang-format==18.1.8

      - name: Validate formatting tools
        working-directory: 'S:\'
        run: |
          clang-format --version
          pre-commit --version

      - name: Run pre-commit checks
        working-directory: 'S:\'
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Require clean formatting result
        working-directory: 'S:\'
        run: git diff --exit-code

  debug:
    name: Debug Build And Tests (x86_64)
    runs-on: windows-2022
    needs: format
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_debug)
    env:
      CMAKE_GENERATOR: Ninja
      CMAKE_GENERATOR_PLATFORM: ""
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 3
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      SCCACHE_CACHE_SIZE: 5G

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Map short workspace path
        run: 'subst S: "$env:GITHUB_WORKSPACE"'

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Validate runner tools
        working-directory: 'S:\'
        run: |
          cmake --version
          git --version
          ninja --version
          cl 2>&1 | Select-Object -First 1
          sccache --version

      - name: Restore Debug sccache
        uses: actions/cache@v6
        with:
          path: .sccache
          key: windows-msvc2022-ninja-debug-sccache-${{ env.SCCACHE_CACHE_VERSION }}-${{ github.run_id }}
          restore-keys: |
            windows-msvc2022-ninja-debug-sccache-${{ env.SCCACHE_CACHE_VERSION }}-

      - name: Reset Debug sccache stats
        working-directory: 'S:\'
        run: sccache --zero-stats

      - name: Restore Debug Ninja Dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            build-debug/external/catch2-*
            build-debug/external/cli11-*
            build-debug/external/cmakerc-*
            build-debug/external/curl-*
            build-debug/external/glfw-*
            build-debug/external/glm-*
            build-debug/external/iconfont-*
            build-debug/external/imgui-*
            build-debug/external/implot-*
            build-debug/external/itk-*
            build-debug/external/nanovg-*
            build-debug/external/nativefiledialog-*
            build-debug/external/nlohmann_json-*
            build-debug/external/qtbase-*
            build-debug/external/spdlog-*
            build-debug/external/stduuid-*
            build-debug/external/tinyfsm-*
          key: windows-msvc2022-ninja-debug-deps-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            windows-msvc2022-ninja-debug-deps-${{ env.DEPS_CACHE_VERSION }}-

      - name: Configure Debug Dependencies
        working-directory: 'S:\'
        run: >
          cmake --preset deps-debug
          -G Ninja
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DEntropy_USE_CCACHE=OFF

      - name: Build Debug Dependencies
        working-directory: 'S:\'
        run: cmake --build --preset deps-debug --parallel

      - name: Configure Debug app
        working-directory: 'S:\'
        run: >
          cmake --preset app-debug
          -G Ninja
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DEntropy_USE_CCACHE=OFF

      - name: Build Debug app
        working-directory: 'S:\'
        run: cmake --build --preset app-debug --parallel

      - name: Run Debug tests
        working-directory: 'S:\'
        run: ctest --test-dir build-debug --parallel $env:CTEST_PARALLEL_LEVEL --output-on-failure

      - name: Show Debug sccache stats
        if: always()
        working-directory: 'S:\'
        continue-on-error: true
        run: |
          sccache --show-stats
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "sccache stats were unavailable; continuing"
          }
          sccache --stop-server
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "sccache server could not be stopped; continuing"
          }
          exit 0

  coverage:
    name: Windows Coverage Report (x86_64)
    runs-on: windows-2022
    needs: format
    if: github.event_name == 'workflow_dispatch' && inputs.run_coverage

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Map short workspace path
        run: 'subst S: "$env:GITHUB_WORKSPACE"'

      - name: Install coverage tools
        working-directory: 'S:\'
        run: |
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/OpenCppCoverage/OpenCppCoverage/releases/tags/release-0.9.9.0" `
            -Headers @{ "User-Agent" = "entropy-ci" }
          $asset = $release.assets |
            Where-Object { $_.name -match "x64" -and $_.name -match "\.exe$" } |
            Select-Object -First 1
          if (-not $asset) {
            throw "OpenCppCoverage x64 installer asset was not found"
          }
          $installer = Join-Path $env:RUNNER_TEMP "OpenCppCoverageSetup.exe"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $installer
          Start-Process -FilePath $installer `
            -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" `
            -Wait
          $openCppCoveragePath = "C:\Program Files\OpenCppCoverage"
          $env:Path = "$openCppCoveragePath;$env:Path"
          $openCppCoveragePath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Get-Command OpenCppCoverage -ErrorAction Stop

      - name: Restore Coverage Dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            build-coverage/external/catch2-*
            build-coverage/external/cli11-*
            build-coverage/external/cmakerc-*
            build-coverage/external/curl-*
            build-coverage/external/glfw-*
            build-coverage/external/glm-*
            build-coverage/external/iconfont-*
            build-coverage/external/imgui-*
            build-coverage/external/implot-*
            build-coverage/external/itk-*
            build-coverage/external/nanovg-*
            build-coverage/external/nativefiledialog-*
            build-coverage/external/nlohmann_json-*
            build-coverage/external/qtbase-*
            build-coverage/external/spdlog-*
            build-coverage/external/stduuid-*
            build-coverage/external/tinyfsm-*
          key: windows-msvc2022-coverage-deps-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            windows-msvc2022-coverage-deps-${{ env.DEPS_CACHE_VERSION }}-

      - name: Configure Coverage Dependencies
        working-directory: 'S:\'
        run: >
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_SHARED_LIBS=ON
          -DEntropy_USE_CCACHE=ON
          -DEntropy_SUPERBUILD=ON
          -DEntropy_SUPERBUILD_CONFIG=Debug

      - name: Build Coverage Dependencies
        working-directory: 'S:\'
        run: cmake --build build-coverage --config Debug --parallel

      - name: Configure Coverage app
        working-directory: 'S:\'
        run: >
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_SHARED_LIBS=ON
          -DEntropy_USE_CCACHE=ON
          -DEntropy_SUPERBUILD=OFF
          -DEntropy_ENABLE_COVERAGE=ON

      - name: Build Coverage app
        working-directory: 'S:\'
        run: cmake --build build-coverage --config Debug --parallel

      - name: Generate XML coverage
        working-directory: 'S:\'
        run: cmake --build build-coverage --target coverage --config Debug --parallel

      - name: Summarize XML coverage
        working-directory: 'S:\'
        run: |
          New-Item -ItemType Directory -Force coverage-artifacts | Out-Null
          Copy-Item build-coverage\coverage\opencppcoverage.xml coverage-artifacts\opencppcoverage.xml -Force
          [xml]$coverage = Get-Content coverage-artifacts\opencppcoverage.xml
          $lineRate = [double]$coverage.coverage.'line-rate'
          $linesCovered = [int]$coverage.coverage.'lines-covered'
          $linesValid = [int]$coverage.coverage.'lines-valid'
          if ($linesValid -le 0) {
            throw "OpenCppCoverage produced an empty Cobertura report. Check module/source path selection."
          }
          $percent = [math]::Round($lineRate * 100, 2)
          "### Windows coverage" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "Line coverage: $percent% ($linesCovered / $linesValid)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Generate HTML coverage
        working-directory: 'S:\'
        run: cmake --build build-coverage --target coverage-html --config Debug --parallel

      - name: Upload coverage XML
        uses: actions/upload-artifact@v7
        with:
          name: windows-coverage-xml
          path: coverage-artifacts/opencppcoverage.xml
          if-no-files-found: error

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: windows-coverage-html
          path: build-coverage/coverage/html/
          if-no-files-found: error

  release:
    name: Windows Release (x86_64)
    runs-on: windows-2022
    needs: format
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_release)

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Map short workspace path
        run: 'subst S: "$env:GITHUB_WORKSPACE"'

      - name: Validate runner tools
        working-directory: 'S:\'
        run: |
          cmake --version
          git --version
          vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          Get-Command candle.exe -ErrorAction Stop
          Get-Command light.exe -ErrorAction Stop

      - name: Restore Release Dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            build-release/external/catch2-*
            build-release/external/cli11-*
            build-release/external/cmakerc-*
            build-release/external/curl-*
            build-release/external/glfw-*
            build-release/external/glm-*
            build-release/external/iconfont-*
            build-release/external/imgui-*
            build-release/external/implot-*
            build-release/external/itk-*
            build-release/external/nanovg-*
            build-release/external/nativefiledialog-*
            build-release/external/nlohmann_json-*
            build-release/external/qtbase-*
            build-release/external/spdlog-*
            build-release/external/stduuid-*
            build-release/external/tinyfsm-*
          key: windows-msvc2022-release-deps-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            windows-msvc2022-release-deps-${{ env.DEPS_CACHE_VERSION }}-

      - name: Configure Release Dependencies
        working-directory: 'S:\'
        run: cmake --preset deps-release

      - name: Build Release Dependencies
        working-directory: 'S:\'
        run: cmake --build --preset deps-release --parallel

      - name: Configure Release app
        working-directory: 'S:\'
        run: cmake --preset app-release

      - name: Build Release app
        working-directory: 'S:\'
        run: cmake --build --preset app-release --parallel

      - name: Run Release tests
        working-directory: 'S:\'
        run: ctest --test-dir build-release -C Release --parallel $env:CTEST_PARALLEL_LEVEL --output-on-failure

      - name: Build MSI and portable ZIP
        working-directory: 'S:\'
        run: cmake --build --preset package-release --parallel

      - name: Smoke-test staged install
        working-directory: 'S:\'
        run: |
          cmake --install build-release --config Release --prefix build-release\windows-package-install
          & .\build-release\windows-package-install\entropy.exe --help

      - name: Upload Windows packages
        uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64-packages
          path: |
            build-release/packages/*.msi
            build-release/packages/*portable.zip
          if-no-files-found: error

  windows-2025-smoke:
    name: Windows Server 2025 Smoke Build And Tests (x86_64)
    runs-on: windows-2025
    needs: format
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_smoke)
    env:
      CMAKE_GENERATOR: "Visual Studio 18 2026"
      CMAKE_GENERATOR_PLATFORM: x64

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Map short workspace path
        run: 'subst S: "$env:GITHUB_WORKSPACE"'

      - name: Validate runner tools
        working-directory: 'S:\'
        run: |
          systeminfo | Select-String -Pattern "OS Name", "OS Version", "System Type"
          cmake --version
          git --version
          vswhere -latest -products * -version "[18.0,19.0)" -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

      - name: Restore Debug Dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            build-debug/external/catch2-*
            build-debug/external/cli11-*
            build-debug/external/cmakerc-*
            build-debug/external/curl-*
            build-debug/external/glfw-*
            build-debug/external/glm-*
            build-debug/external/iconfont-*
            build-debug/external/imgui-*
            build-debug/external/implot-*
            build-debug/external/itk-*
            build-debug/external/nanovg-*
            build-debug/external/nativefiledialog-*
            build-debug/external/nlohmann_json-*
            build-debug/external/qtbase-*
            build-debug/external/spdlog-*
            build-debug/external/stduuid-*
            build-debug/external/tinyfsm-*
          key: windows-2025-msvc2026-debug-deps-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('CMakePresets.json', 'CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: |
            windows-2025-msvc2026-debug-deps-${{ env.DEPS_CACHE_VERSION }}-

      - name: Configure Debug Dependencies
        working-directory: 'S:\'
        run: cmake --preset deps-debug

      - name: Build Debug Dependencies
        working-directory: 'S:\'
        run: cmake --build --preset deps-debug --parallel

      - name: Configure Debug app
        working-directory: 'S:\'
        run: cmake --preset app-debug

      - name: Build Debug app
        working-directory: 'S:\'
        run: cmake --build --preset app-debug --parallel

      - name: Run Debug tests
        working-directory: 'S:\'
        run: ctest --test-dir build-debug -C Debug --parallel $env:CTEST_PARALLEL_LEVEL --output-on-failure
